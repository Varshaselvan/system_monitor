<!DOCTYPE html>
<html>
<head>

<title>System Monitor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fb;
font-family:Segoe UI;
}

.navbar{
background:linear-gradient(90deg,#007bff,#00c6ff);
}

.card-blue{
background:#e8f4ff;
border-radius:12px;
box-shadow:0px 4px 12px rgba(0,0,0,0.08);
}

.hero{
padding:80px 20px;
text-align:center;
}

.hero h1{
font-weight:700;
}

.btn-main{
background:#007bff;
color:white;
}

footer{
background:#f0f0f0;
padding:20px;
margin-top:50px;
}

.table{
background:white;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand fw-bold" href="/">
<i class="fa-solid fa-server"></i>
System Monitor
</a>

<div>

<a href="/" class="btn btn-light btn-sm me-2">
<i class="fa fa-home"></i> Home
</a>

{% if session.get('user') %}
<a href="/dashboard" class="btn btn-light btn-sm me-2">
Dashboard
</a>
<a href="/systems" class="btn btn-light btn-sm me-2">
Systems
</a>
<a href="/logout" class="btn btn-danger btn-sm">
Logout
</a>
{% endif %}

{% if not session.get('user') %}
<a href="/login" class="btn btn-light btn-sm me-2">
User Login
</a>
<a href="/register" class="btn btn-light btn-sm me-2">
Register
</a>
{% endif %}

<a href="/admin" class="btn btn-warning btn-sm">
Admin
</a>

</div>

</div>
</nav>


<div class="container mt-4">

{% block content %}

{% endblock %}

</div>


<footer class="text-center">

<p class="text-muted">
<i class="fa-solid fa-shield-halved"></i>
Cyber Physical Monitoring Platform
</p>

</footer>

</body>
</html>
